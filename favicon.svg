<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Dork Search Studio">
  <rect x="2" y="2" width="60" height="60" rx="2" fill="#c8f000" stroke="#0a0a0a" stroke-width="4"/>
  <circle cx="27" cy="27" r="13" fill="#fbf9f1" stroke="#0a0a0a" stroke-width="5"/>
  <line x1="36" y1="36" x2="51" y2="51" stroke="#0a0a0a" stroke-width="7" stroke-linecap="square"/>
  <line x1="36" y1="36" x2="49" y2="49" stroke="#ff4d8d" stroke-width="3" stroke-linecap="square"/>
  <!-- brutalist pulse -->
  <circle cx="27" cy="27" r="13" fill="none" stroke="#2b4cff" stroke-width="3" opacity="0">
    <animate attributeName="r" values="13;20;13" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
